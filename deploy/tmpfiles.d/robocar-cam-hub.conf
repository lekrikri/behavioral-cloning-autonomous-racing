# Exclut les régions SHM du hub caméra du nettoyage systemd-tmpfiles.
# Les écritures mmap (MAP_SHARED) ne mettent PAS à jour mtime → sans cette règle,
# systemd-tmpfiles-clean supprime /dev/shm/robocar_cam_* alors qu'elles sont activement
# utilisées (le hub écrit, les consommateurs lisent). 'x' = ignorer au nettoyage.
x /dev/shm/robocar_cam_*
